name: org_gate_base

on:
  workflow_call:

permissions:
  statuses: write
  checks: read
  pull-requests: read

concurrency:
  group: org-gate-${{ github.repository }}-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.draft }}
  cancel-in-progress: true

jobs:
  copilot_review_watcher:
    runs-on: ubuntu-latest
    container: ghcr.io/zyplux/ci:0.1.1
    steps:
      - name: Check out gate script
        uses: actions/checkout@v6
        with:
          repository: zyplux/.github
          ref: main
          path: gate
          sparse-checkout: apps/copilot-review-gate/src
      - name: Record Copilot review as a commit status
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: uv run --python 3.14 gate/apps/copilot-review-gate/src/copilot_review_gate/cli.py
